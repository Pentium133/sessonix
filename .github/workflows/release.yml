name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            bundles: "app,dmg"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            bundles: "app,dmg"
          - platform: ubuntu-22.04
            args: ""
            bundles: "deb,appimage"
          - platform: windows-latest
            args: ""
            bundles: "msi,nsis"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Check Tauri CLI version
        run: npx tauri --version

      - name: Build Tauri
        run: npx tauri build ${{ matrix.args }} --bundles ${{ matrix.bundles }} --verbose

      - name: List bundle artifacts
        if: always()
        run: |
          echo "=== Bundle contents ==="
          find src-tauri/target -path "*/release/bundle/*" -type f 2>/dev/null || echo "No bundle files found"
        shell: bash

      - name: Upload to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app.tar.gz
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/appimage/*.AppImage
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


